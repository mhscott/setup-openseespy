name: "Setup OpenSeesPy"
description: "Install OpenSeesPy and dependencies"

branding:
  icon: "package"
  color: "blue"
  
runs:
  using: "composite"

  steps:
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        # sudo apt-get install -y gfortran

    - name: Install OpenSeesPy
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install openseespy
