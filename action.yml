name: "Setup OpenSeesPy"
description: "Install OpenSeesPy and dependencies"

branding:
  icon: "package"
  color: "blue"

inputs:
  version:
    description: "openseespy version"
    required: false
    default: "latest"

  opsvis:
    description: "Install opsvis package"
    required: false
    default: "false"

runs:
  using: "composite"

  steps:
    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # sudo apt-get update
        # sudo apt-get install -y gfortran
        true # harmless command

    - name: Install OpenSeesPy on Linux/macOS
      if: runner.os != 'Windows'
      shell: bash
      run: |
        python -m pip install --upgrade pip

        if [ "${{ inputs.version }}" = "latest" ]; then
          python -m pip install openseespy
        else
          python -m pip install openseespy==${{ inputs.version }}
        fi

        if [ "${{ inputs.opsvis }}" = "true" ]; then
          python -m pip install opsvis
        fi

    - name: Install OpenSeesPy on Windows
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        python -m pip install --upgrade pip

        if ("${{ inputs.version }}" -eq "latest") {
          python -m pip install openseespy
        }
        else {
          python -m pip install openseespy==${{ inputs.version }}
        }

        if ("${{ inputs.opsvis }}" -eq "true") {
          python -m pip install opsvis
        }
